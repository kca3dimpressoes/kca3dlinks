<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links - Cristian | KCA3D</title>
    <style>
        :root {
            /* Paleta de cores baseada na logo KCA3D */
            --bg-color: #0f1016; /* Fundo escuro para destacar as cores neon */
            --text-color: #ffffff; /* Texto principal branco */
            --text-light: #a0a0b0; /* Texto secundário acinzentado */
            
            /* Cores dos botões */
            --btn-bg: #1a1b26; /* Fundo do botão sutilmente mais claro que a tela */
            --btn-border: #00d2ff; /* Azul/Ciano da logo */
            --btn-hover-gradient: linear-gradient(90deg, #00d2ff 0%, #ff007f 100%); /* Gradiente Ciano para Magenta/Rosa */
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color);
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 2rem 1rem; 
            margin: 0;
            min-height: 100vh;
        }

        /* Estilo da foto de perfil com efeito de brilho */
        /* Estilo da foto de perfil original */
        .profile-pic { 
            width: 250px; /* Largura da imagem (pode ajustar se quiser maior/menor) */
            height: auto; /* Deixa a altura automática para não achatar ou esticar a foto */
            margin-bottom: 1rem; 
            
            /* Mantive apenas um leve brilho no fundo para combinar com o tema escuro */
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
            border-radius: 12px; /* Deixa as pontinhas da foto levemente arredondadas (opcional) */
        }

        h1 { 
            color: var(--text-color); 
            margin: 0 0 0.5rem 0; 
            font-size: 1.8rem;
            letter-spacing: 2px;
        }

        p { 
            color: var(--text-light); 
            margin-bottom: 2.5rem; 
            text-align: center; 
            font-size: 1rem;
        }

        /* Container dos botões */
        .links-container {
            width: 100%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        /* Estilo dos botões modernos */
        .link-btn { 
            display: block; 
            width: 100%; 
            padding: 1rem; 
            background-color: var(--btn-bg); 
            color: var(--text-color); 
            text-align: center; 
            text-decoration: none; 
            border-radius: 12px; 
            font-weight: 600; 
            letter-spacing: 1px;
            transition: all 0.4s ease;
            box-sizing: border-box;
            border: 2px solid var(--btn-border); /* Borda ciano */
        }

        /* Efeito quando passa o mouse ou clica no botão */
        .link-btn:hover { 
            background: var(--btn-hover-gradient);
            border-color: transparent;
            transform: translateY(-4px); /* Botão "pula" um pouquinho pra cima */
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3); /* Sombra neon */
            color: #ffffff;
        }
    </style>
</head>
<body>

    <img src="logoKCA.png" alt="Logo KCA3D" class="profile-pic">

    <h1>KCA3D</h1>
    <p>Impressão 3D, Projetos Especiais</p>

    <div class="links-container">
        <!-- Link do WhatsApp -->
        <a href="https://wa.me/5545991032480?text=Olá!%20Gostaria%20de%20fazer%20um%20orçamento%20com%20a%20KCA3D." class="link-btn" target="_blank">Orçamentos via WhatsApp</a>
        
        <!-- Link do Catálogo -->
        <a href="https://wa.me/c/5545991032480" class="link-btn" target="_blank">Catálogo de Peças 3D</a>
    </div>

</body>
</html>
